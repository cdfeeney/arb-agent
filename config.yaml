dry_run: true   # true = find + alert opportunities but place NO real orders

polling:
  interval_seconds: 30                # main entry-side scan cadence (5000+10000 markets)
  max_concurrent_fetches: 10
  monitor_interval_seconds: 15        # exit-side hot loop. Polls only the bid books for
                                      # currently-open positions. Decoupled from the entry
                                      # scan so we can react to book moves at sub-minute
                                      # cadence without waiting for the slow market-wide poll.
  monitor_max_concurrent: 8           # books fetched in parallel per monitor cycle
  # Two-tier polling (#24): cold scan (above) does the universe-wide
  # match + LLM verification ~30s. Hot scan re-polls just the books for
  # already-verified pairs at sub-10s cadence so we catch convergence
  # inside the cold-cycle window.
  hot_interval_seconds: 10            # cadence for re-polling verified-pair books.
                                      # Conservative starting value — at hot_max_pairs=30
                                      # we hit ~6 req/sec aggregate (3 Kalshi + 3 Poly).
                                      # Drop to 5 once we observe rate-limit headroom.
  hot_max_pairs: 30                   # cap concurrent book fetches per hot cycle.
                                      # Cold cycle typically yields 1-3 verified pairs;
                                      # 30 is plenty of headroom across cumulative cold
                                      # cycles within the TTL window.
  hot_pair_ttl_seconds: 1800          # evict pairs not re-verified within 30 min
                                      # (market closed, went illiquid, lost match)

kalshi:
  base_url: "https://trading-api.kalshi.com/trade-api/v2"
  api_key_id: ""           # set via KALSHI_API_KEY_ID env var
  private_key_path: ""     # set via KALSHI_PRIVATE_KEY_PATH env var
  rate_limit_per_min: 60
  # Category-driven fetch: each category fetched in parallel, results unioned.
  # Targets the segments most likely to have Polymarket twins. Comment out
  # categories to disable. Available: Politics, Elections, Sports, Economics,
  # Crypto, Companies, Climate and Weather, World, Science and Technology,
  # Financials, Commodities, Health, Entertainment, Mentions, Transportation.
  categories:
    - "Politics"
    - "Elections"
    - "Sports"
    - "Economics"
    - "Crypto"
    - "Companies"
    - "World"
    - "Climate and Weather"
    - "Science and Technology"
    - "Financials"
    - "Commodities"

polymarket:
  gamma_url: "https://gamma-api.polymarket.com"
  clob_url: "https://clob.polymarket.com"
  rate_limit_per_min: 120

matching:
  similarity_threshold: 55     # rapidfuzz token_sort_ratio minimum (0-100) — broad net, LLM filters false matches.
                               # Lowered from 65 (2026-04-30) so inverse-phrased pairs ("X not happens" vs "X happens")
                               # reach the LLM. Anchor-token bypass (matcher) ALSO catches sub-threshold pairs that
                               # share ≥3 distinctive tokens (e.g. proper nouns), so the effective floor is much lower.
  expiry_proximity_hours: 72   # markets must close within this window of each other
  anchor_min_shared: 2         # tier-2 anchor-token bypass minimum shared distinctive tokens.
                               # Set to 2 so "Will OpenAI not IPO" + "Who will IPO – OpenAI"
                               # qualifies on {openai, ipo}. LLM filters false positives like
                               # "Trump visits France" vs "Trump visits Italy" (also 2 shared).

llm:
  enabled: true                # set false to skip LLM and use fuzzy match alone
  provider: "anthropic"
  api_key_env: "ANTHROPIC_API_KEY"
  model: "claude-haiku-4-5-20251001"   # cheap + fast; bump to sonnet for tougher cases
  cache_hours: 24              # re-verify a pair only after this long
  max_pairs_per_cycle: 400     # bumped from 200 (2026-04-30): with lower fuzz threshold + anchor bypass,
                               # more candidate pairs flow. 24h LLM cache makes this cheap after first cycle —
                               # only NEW pairs hit the API; previously-verified ones return instantly from DB.

filters:
  min_volume: 500              # DIAGNOSTIC: temporarily lowered from 5000 to validate pipeline.
                               # Empirical: top binary Kalshi market in 14d window had ~$1.4k vol.
                               # Re-tighten to 5000 once we confirm verifier behavior on real pairs.
  min_hours_to_close: 1        # DIAGNOSTIC: lowered from 24. We can't fill both legs on
                               # a market closing in <1h, so 1h is a hard floor; 24h was
                               # the pre-paper-trading conservative value. Re-tighten before
                               # going live (recommended: 6h once execution latency is known).
  max_days_to_close: 365       # Widened from 60 to 365 (2026-04-30): third-party arb tracker
                               # showed 70%+ of available cross-platform arbs live in the
                               # 180-921 day range (2026 elections, IPOs, year-end policy
                               # bets). The 60-day window was systematically excluding the
                               # bulk of the opportunity set. Watch for re-introduction of
                               # the "unquoted long-dated markets" bug — if seen, narrow back.
  min_profit_pct: 0.03         # 3% minimum gross edge. With Kalshi taker (0.07) + Polymarket
                               # politics taker (0.04), entry-only fees ≈ 2.75% of stake at
                               # P≈0.5. Holding to resolution: break-even ~2.75%. Anything
                               # under 3% gross is negative-EV by design even before slippage
                               # or partial-unwind exit fees. Bump to 0.04 if we ever stop
                               # holding to resolution (entry+exit fees ≈ 5.5%).

sizing:
  bankroll: 100                # total capital deployed across both platforms.
                               # Paper-trading with $100 to mirror the real-life constraint
                               # — sizing engine will reject opps that don't fit, and at
                               # this bankroll we naturally favor higher-edge arbs.
  max_position_pct: 0.10       # up to 10% of bankroll per opp = $10 max stake at $100 bankroll.
                               # Bumped from 5% so we can actually deploy capital — at 5%
                               # ($5 stake) Kalshi+Polymarket fees (~0.28) eat 5.6% of stake
                               # which kills sub-5% arbs. $10 stakes get fees down to ~2.75%.
  min_bet: 0.5                 # platform-side floor. With $100 bankroll and typical
                               # cost_per_contract ~$0.94, $0.50 lets us enter positions of
                               # 1 contract on Kalshi minimum + 1 on Polymarket — the natural
                               # "minimum unit of arbitrage" — without padding to $1. Reduces
                               # fee drag-as-fraction of stake; capture more diverse positions.
  max_bet: 10                  # hard ceiling at 10% of $100 bankroll. Single arb can't
                               # blow through more than this.
  kelly_fraction: 1.0          # full Kelly. Rationale: cross-platform arbs are near-deterministic
                               # (both sides hedge each other); the variance that justifies
                               # quarter-Kelly comes from leg-fill risk, which our naked-leg
                               # defense (#34) handles. max_bet still caps exposure at 10% of
                               # bankroll regardless of what Kelly says.
  kelly_low_edge_threshold: 0.03   # profit ideas #4: dynamic Kelly. Below this edge (3%),
                                   # use half-Kelly. Slippage + naked-leg + fee variance
                                   # eats a larger fraction of a thin edge.
  kelly_high_edge_threshold: 0.07  # at or above this edge (7%), use full kelly_fraction.
                                   # Linear ramp between low and high.
  liquidity_cap_pct: 0.10      # don't take more than 10% of available market volume
  book_depth_fraction: 0.25    # entry leg-USD ≤ this fraction of unwind-side bid depth.
                               # Stops phantom MTM losses by ensuring positions can be
                               # exited at top-of-book. With 0.25, a market with $40 of
                               # bid depth → $10 entry per leg. The user's "$10 → $1 is
                               # fine" principle: small in shallow books, larger in deep.
  min_bid_depth_usd: 20        # tier-1 profit-idea #2: reject thin sub-outcome arbs at
                               # entry. Multi-outcome event UIs report parent-event
                               # liquidity ($5k+) but a sub-outcome can have $5 of real
                               # bid depth. With a $20 floor, the smallest entry our
                               # 0.25 book_depth_fraction would allow is $5/leg ($10
                               # total) — fits the $10 max_bet cleanly. Trades below
                               # this floor are inherently unexitable on $100 bankroll.

fees:
  # Both platforms charge ONLY the taker (the side hitting a resting order).
  # Our arbs always cross the spread to fill instantly so we are always takers
  # on entry; partial unwinds at the bid are also taker fills.
  kalshi_fee_rate: 0.07              # Kalshi standard taker rate. Some categorised
                                     # contracts are lower; this is the conservative default.
  polymarket_default_rate: 0.05      # Generic / Other / Culture / Weather / Economics rate.
                                     # Politics / Finance / Tech / Mentions: 0.04. Crypto: 0.072.
                                     # Sports: 0.03. Geopolitics: free. Per-category lookup
                                     # in fees.py picks the right rate when the market dict
                                     # carries a `category` field.
  # NOTE: no polymarket_gas_per_order. Polymarket relayer pays gas for traders
  # — gas cost to us = $0.

alerts:
  dedup_window_minutes: 60     # suppress re-alerts for same pair within this window
  sms_to: ""                   # your phone number e.g. +12125551234 — set via SMS_TO env var
  sms_from: ""                 # your Twilio number e.g. +18885551234 — set via SMS_FROM env var

database:
  path: "data/opportunities.db"

# Order execution layer.
#   log_only — write structured `orders` rows (idempotency-keyed, correlated
#              per pair, full leg breakdown) but DO NOT hit any exchange.
#              Same DB schema and writers as live mode, so dashboards/probes
#              keep working when we flip the flag.
#   live     — real Polymarket + Kalshi order placement. STUBBED in Sprint 1
#              (raises NotImplementedError). Sprint 2 implements signing +
#              two-leg orchestration with naked-leg defense.
execution:
  mode: log_only                      # log_only | live
                                      #   log_only — fake fills, no exchange touched
                                      #   live     — real exchange writers, but see allow_send
  allow_send: false                   # FINAL kill switch. Even in live mode, when
                                      # false: writers construct + sign + log the
                                      # full request, then short-circuit the actual
                                      # POST and return a fake fill. This is the
                                      # dress-rehearsal mode — verifies auth, signing,
                                      # and request shape work end-to-end without
                                      # spending a cent. Flip to true to actually trade.
  naked_leg_timeout_seconds: 2.0      # one-leg-filled grace before we cancel
                                      # laggard + market-sell the filled leg
  per_leg_timeout_seconds: 5.0        # total wait before giving up on both legs
  max_live_orders_per_day: 10         # hard cap on real exchange orders per UTC day.
                                      # When exceeded, every executor refuses further
                                      # real sends AND auto-creates data/STOP so the
                                      # block persists past midnight UTC. Conservative
                                      # starting value for early live trading; raise
                                      # once we have ≥1 week of stable operation.
                                      # Set to 0 to disable the cap.

# Position-monitor / exit logic. Each cycle, mark-to-market every open paper
# trade; recommend EXIT when convergence threshold hit OR when annualized
# return on early exit beats hold-to-resolution by required multiple. In dry
# run mode, EXIT is paper-only — sets the trade status to 'exited' and
# applies a re-entry cooldown so the scanner doesn't re-buy into our move.
exit:
  enabled: true
  convergence_threshold: 0.7        # exit when 70% of arb captured by spread tightening
  annualized_multiple: 1.5          # exit if early-exit annualized > 1.5× hold annualized
  max_slippage_pct: 0.02            # downgrade EXIT to HOLD if VWAP slips >2% from best bid
  cooldown_minutes: 60              # don't re-enter exited pairs for this long
  min_days_remaining_to_force_hold: 0.25  # within 6h of resolution, default to hold.
                                          # Lowered from 0.5 (12h) on 2026-05-01 per
                                          # profit-ideas #3 — the 6-12h window often
                                          # has profitable spreads we were force-holding
                                          # through. The new spike-capture override
                                          # below also fires within this 6h window.
  near_resolution_spike_fee_multiple: 2.0 # within force-hold window, override HOLD only
                                          # if net realized > exit_fees × this multiple.
                                          # Default 2x means the spike must be clearly
                                          # real (covers exit fees and doubles them in
                                          # profit) not just barely-above-zero.
  min_capture_above_fees: 1.5       # require taker-exit gross capture to exceed
                                    # exit fees by this multiple before firing
                                    # PARTIAL_UNWIND. Default 1.5 means net must
                                    # be ≥ 1.5× exit_fees, i.e. gross ≥ 2.5×
                                    # exit_fees. Prevents the "$0.02 net after $0.12
                                    # exit fees" bleed where we throw away unrealized
                                    # convergence + sunk entry fees. Maker-exit
                                    # path runs first (0% poly fee) when it fires;
                                    # this gate is the safety floor for the
                                    # taker fallback. Set to 0 to revert to old
                                    # "any positive net" behavior. See trade #379
                                    # forensics in scripts/why_closed.py output.
  partial_unwind_min_size: 0.1      # smallest unwind worth executing (in contracts).
                                    # With $1-3 stakes on $100 bankroll, positions hold
                                    # 1-3 contracts; 0.1 lets the monitor exit fractionally
                                    # in dry-run to capture realized P&L data overnight.
                                    # Live mode will need integer floors per platform.
  maker_exit:                       # profit ideas #1: 0% Polymarket maker fee capture.
                                    # When PARTIAL_UNWIND fires on a position with a
                                    # Polymarket leg, REST a sell-limit at best_bid +
                                    # spread instead of taker-exiting. ~40% lift on net
                                    # realized when filled. If not filled within
                                    # max_age_seconds, cancel and fall back to taker.
    enabled: true
    spread_above_bid: 0.01          # how many ¢ above current best_bid to rest at
    max_age_seconds: 86400          # 24h before cancel + taker fallback. Reasoning
                                    # (2026-05-02): the maker order is a free option
                                    # — it doesn't lock additional capital beyond the
                                    # underlying position we're already holding.
                                    # Spreads tighten as resolution approaches; book
                                    # sweeps periodically lift resting orders. Bailing
                                    # to taker after 5 min just burns fees. The only
                                    # real downside of a long-rest maker is "stale
                                    # price" — if best_bid moves UP significantly past
                                    # our target, we sell cheap. Future enhancement:
                                    # cancel + reprice when best_bid > target + threshold.
                                    # For now: 24h gives maximum chance to fill cleanly.
                                    # Set lower if you observe stale-price losses.
    polymarket_only: true           # Kalshi has same fee both sides → no maker benefit

# Correlated-lag detector (Phase 2 strategy). When BTC moves significantly
# but Kalshi crypto markets haven't repriced, emit a directional signal.
# See LAG_DESIGN.md.
lag:
  enabled: true
  underlying: "BTC"
  feed:
    source: "coinbase"     # coinbase (US-friendly default) or binance
    symbol: "BTC-USD"      # coinbase uses BTC-USD; binance uses btcusdt
    reconnect_seconds: 5
    binance_us_endpoint: false  # set true if using binance source from a US IP
  detection:
    window_seconds: 60
    btc_threshold_pct: 2.0          # |BTC change| must exceed this
    market_flat_threshold_pp: 0.5   # market mid moved less than this = "flat"
    min_market_volume: 500
  ticker_prefixes:
    - "KXBTC"
    - "KXBTCD"
    - "KXBTCMAXY"
    - "KXETH"
  question_keywords:
    - "bitcoin"
    - "btc"
    - "ethereum"
    - "eth"

promotions:
  active: []
  # Example promo entry:
  # - platform: "kalshi"
  #   type: "free_bet"
  #   amount: 100
  #   label: "April signup bonus"
