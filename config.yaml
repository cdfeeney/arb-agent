dry_run: true   # true = find + alert opportunities but place NO real orders

polling:
  interval_seconds: 30
  max_concurrent_fetches: 10

kalshi:
  base_url: "https://trading-api.kalshi.com/trade-api/v2"
  api_key_id: ""           # set via KALSHI_API_KEY_ID env var
  private_key_path: ""     # set via KALSHI_PRIVATE_KEY_PATH env var
  rate_limit_per_min: 60
  # Category-driven fetch: each category fetched in parallel, results unioned.
  # Targets the segments most likely to have Polymarket twins. Comment out
  # categories to disable. Available: Politics, Elections, Sports, Economics,
  # Crypto, Companies, Climate and Weather, World, Science and Technology,
  # Financials, Commodities, Health, Entertainment, Mentions, Transportation.
  categories:
    - "Politics"
    - "Elections"
    - "Sports"
    - "Economics"
    - "Crypto"
    - "Companies"
    - "World"
    - "Climate and Weather"
    - "Science and Technology"
    - "Financials"
    - "Commodities"

polymarket:
  gamma_url: "https://gamma-api.polymarket.com"
  clob_url: "https://clob.polymarket.com"
  rate_limit_per_min: 120

matching:
  similarity_threshold: 55     # rapidfuzz token_sort_ratio minimum (0-100) — broad net, LLM filters false matches.
                               # Lowered from 65 (2026-04-30) so inverse-phrased pairs ("X not happens" vs "X happens")
                               # reach the LLM. Anchor-token bypass (matcher) ALSO catches sub-threshold pairs that
                               # share ≥3 distinctive tokens (e.g. proper nouns), so the effective floor is much lower.
  expiry_proximity_hours: 72   # markets must close within this window of each other
  anchor_min_shared: 2         # tier-2 anchor-token bypass minimum shared distinctive tokens.
                               # Set to 2 so "Will OpenAI not IPO" + "Who will IPO – OpenAI"
                               # qualifies on {openai, ipo}. LLM filters false positives like
                               # "Trump visits France" vs "Trump visits Italy" (also 2 shared).

llm:
  enabled: true                # set false to skip LLM and use fuzzy match alone
  provider: "anthropic"
  api_key_env: "ANTHROPIC_API_KEY"
  model: "claude-haiku-4-5-20251001"   # cheap + fast; bump to sonnet for tougher cases
  cache_hours: 24              # re-verify a pair only after this long
  max_pairs_per_cycle: 400     # bumped from 200 (2026-04-30): with lower fuzz threshold + anchor bypass,
                               # more candidate pairs flow. 24h LLM cache makes this cheap after first cycle —
                               # only NEW pairs hit the API; previously-verified ones return instantly from DB.

filters:
  min_volume: 500              # DIAGNOSTIC: temporarily lowered from 5000 to validate pipeline.
                               # Empirical: top binary Kalshi market in 14d window had ~$1.4k vol.
                               # Re-tighten to 5000 once we confirm verifier behavior on real pairs.
  min_hours_to_close: 1        # DIAGNOSTIC: lowered from 24. We can't fill both legs on
                               # a market closing in <1h, so 1h is a hard floor; 24h was
                               # the pre-paper-trading conservative value. Re-tighten before
                               # going live (recommended: 6h once execution latency is known).
  max_days_to_close: 365       # Widened from 60 to 365 (2026-04-30): third-party arb tracker
                               # showed 70%+ of available cross-platform arbs live in the
                               # 180-921 day range (2026 elections, IPOs, year-end policy
                               # bets). The 60-day window was systematically excluding the
                               # bulk of the opportunity set. Watch for re-introduction of
                               # the "unquoted long-dated markets" bug — if seen, narrow back.
  min_profit_pct: 0.02         # 2% minimum net edge after fees

sizing:
  bankroll: 10000              # total capital deployed across both platforms
  max_position_pct: 0.05       # never risk more than 5% of bankroll per opp
  min_bet: 10                  # platform minimums
  max_bet: 500
  kelly_fraction: 0.25         # quarter-Kelly (conservative; tune up as you gain confidence)
  liquidity_cap_pct: 0.10      # don't take more than 10% of available market volume
  book_depth_fraction: 0.25    # entry leg-USD ≤ this fraction of unwind-side bid depth.
                               # Stops phantom MTM losses by ensuring positions can be
                               # exited at top-of-book. With 0.25, a market with $40 of
                               # bid depth → $10 entry per leg. The user's "$10 → $1 is
                               # fine" principle: small in shallow books, larger in deep.

fees:
  kalshi_fee_rate: 0.07              # Kalshi: ceil(rate × N × p × (1-p)) cents per contract
  polymarket_gas_per_order: 0.10     # Polymarket: flat USD gas per order on Polygon

alerts:
  dedup_window_minutes: 60     # suppress re-alerts for same pair within this window
  sms_to: ""                   # your phone number e.g. +12125551234 — set via SMS_TO env var
  sms_from: ""                 # your Twilio number e.g. +18885551234 — set via SMS_FROM env var

database:
  path: "data/opportunities.db"

# Position-monitor / exit logic. Each cycle, mark-to-market every open paper
# trade; recommend EXIT when convergence threshold hit OR when annualized
# return on early exit beats hold-to-resolution by required multiple. In dry
# run mode, EXIT is paper-only — sets the trade status to 'exited' and
# applies a re-entry cooldown so the scanner doesn't re-buy into our move.
exit:
  enabled: true
  convergence_threshold: 0.7        # exit when 70% of arb captured by spread tightening
  annualized_multiple: 1.5          # exit if early-exit annualized > 1.5× hold annualized
  max_slippage_pct: 0.02            # downgrade EXIT to HOLD if VWAP slips >2% from best bid
  cooldown_minutes: 60              # don't re-enter exited pairs for this long
  min_days_remaining_to_force_hold: 0.5   # within 12h of resolution, always hold

# Correlated-lag detector (Phase 2 strategy). When BTC moves significantly
# but Kalshi crypto markets haven't repriced, emit a directional signal.
# See LAG_DESIGN.md.
lag:
  enabled: true
  underlying: "BTC"
  feed:
    source: "coinbase"     # coinbase (US-friendly default) or binance
    symbol: "BTC-USD"      # coinbase uses BTC-USD; binance uses btcusdt
    reconnect_seconds: 5
    binance_us_endpoint: false  # set true if using binance source from a US IP
  detection:
    window_seconds: 60
    btc_threshold_pct: 2.0          # |BTC change| must exceed this
    market_flat_threshold_pp: 0.5   # market mid moved less than this = "flat"
    min_market_volume: 500
  ticker_prefixes:
    - "KXBTC"
    - "KXBTCD"
    - "KXBTCMAXY"
    - "KXETH"
  question_keywords:
    - "bitcoin"
    - "btc"
    - "ethereum"
    - "eth"

promotions:
  active: []
  # Example promo entry:
  # - platform: "kalshi"
  #   type: "free_bet"
  #   amount: 100
  #   label: "April signup bonus"
